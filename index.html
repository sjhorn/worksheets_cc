<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="worksheets.cc - spreadsheet in your browser">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Worksheets.cc">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="worksheet.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Worksheets.cc</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      background-color: #ffffff;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      z-index: 9999;
    }

    #loading-screen img {
      width: 256px;
      animation: pulse 1.5s ease-in-out infinite; /* optional animation */
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-screen">
    <img src="icons/icon-512.png" alt="worksheets.cc starting..." />
    <!-- Optional: add a spinner or text below -->
    <p style="font-family: sans-serif; color: #888; margin-top: 16px;">worksheets.cc starting...</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      // Hide loading screen once Flutter renders its first frame
      var loadingScreen = document.getElementById('loading-screen');
      loadingScreen.style.opacity = '0';
      loadingScreen.style.transition = 'opacity 0.5s ease';
      setTimeout(function() {
        loadingScreen.style.display = 'none';
      }, 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
